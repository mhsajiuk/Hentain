<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Hentain - Streaming Anime & Hentai Terlengkap</title>
    <meta name="description" content="Streaming anime dan hentai gratis, tercepat dengan subtitle Indonesia.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Henta<span>in</span></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari judul anime...">
            <button id="searchBtn">Cari</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Selamat Datang di <span>Hentain</span></h1>
            <p>Nikmati ribuan koleksi anime & hentai dengan kualitas terbaik secara gratis.</p>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <h2>Rilis Terbaru</h2>
            <div class="grid" id="latest-grid">
                <!-- Loading Skeleton -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>

        <section class="section">
            <h2>Hentai Terbaru</h2>
            <div class="grid" id="hentai-grid">
                <!-- Loading Skeleton -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>

        <section class="section">
            <h2>JAV & 3D Terbaru</h2>
            <div class="grid" id="jav-grid">
                <!-- Loading Skeleton -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hentain. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
